<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>FullStack_Developer_Irtaza_Updated.pdf</title>
    <style>
      :root {
        color-scheme: light only;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #525659;
        color-scheme: light only;
        overflow: hidden;
      }
      .toolbar {
        height: 48px;
        background: #323639;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        color: #f1f1f1;
        font: 13px system-ui, sans-serif;
      }
      .toolbar-title {
        opacity: 0.9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .toolbar a {
        color: #8ab4f8;
        text-decoration: none;
        font-weight: 500;
      }
      .toolbar a:hover {
        text-decoration: underline;
      }
      .viewer {
        height: calc(100vh - 48px);
        overflow-y: auto;
        padding: 16px 0 32px;
      }
      #pages {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      canvas {
        display: block;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        max-width: calc(100vw - 24px);
        height: auto !important;
      }
      #status {
        color: #fff;
        text-align: center;
        padding: 40px;
        font: 14px system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span class="toolbar-title">FullStack_Developer_Irtaza_Updated.pdf</span>
      <a href="/resume.pdf" download="FullStack_Developer_Irtaza_Updated.pdf">Download original</a>
    </div>
    <div class="viewer">
      <div id="status">Loading…</div>
      <div id="pages"></div>
    </div>

    <script type="module">
      import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';

      const container = document.getElementById('pages');
      const status = document.getElementById('status');

      try {
        const pdf = await pdfjsLib.getDocument('/resume.pdf').promise;
        status.remove();

        for (let n = 1; n <= pdf.numPages; n++) {
          const page = await pdf.getPage(n);
          const base = page.getViewport({ scale: 1 });
          const maxW = Math.min(920, window.innerWidth - 24);
          const viewport = page.getViewport({ scale: maxW / base.width });

          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          container.appendChild(canvas);

          await page.render({
            canvasContext: canvas.getContext('2d'),
            viewport,
          }).promise;
        }
      } catch (e) {
        status.textContent = 'Failed to load PDF.';
        console.error(e);
      }
    </script>
  </body>
</html>
